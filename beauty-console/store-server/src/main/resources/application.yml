# store-server/src/main/resources/application.yml
server:
  port: ${STORE_PORT:8080}

spring:
  application:
    name: store-appointment-server

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  cache:
    type: redis
    redis:
      time-to-live: 10m
      cache-null-values: false

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.wkr.storepojo.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

store:
  demo:
    read-only: ${STORE_DEMO_READ_ONLY:false}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

springdoc:
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: admin
      display-name: 门店后台管理接口
      paths-to-match: /admin/**
      packages-to-scan: com.wkr.storeserver.controller
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
