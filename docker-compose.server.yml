name: beauty-console

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    mem_limit: 640m
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=256M
      - --max-connections=50
      - --performance-schema=OFF
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${STORE_DB_DATABASE:-db_platform}
      MYSQL_USER: ${STORE_DB_USERNAME:-store_app}
      MYSQL_PASSWORD: ${STORE_DB_PASSWORD:?STORE_DB_PASSWORD is required}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./beauty-console/store-server/src/main/resources/sql/docker/01-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./beauty-console/store-server/src/main/resources/sql/patch_permission_points.sql:/docker-entrypoint-initdb.d/02-permission-points.sql:ro
      - ./beauty-console/store-server/src/main/resources/sql/patch_role_permissions.sql:/docker-entrypoint-initdb.d/03-role-permissions.sql:ro
      - ./beauty-console/store-server/src/main/resources/sql/patch_test_role_accounts.sql:/docker-entrypoint-initdb.d/04-test-accounts.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    mem_limit: 160m
    environment:
      REDIS_PASSWORD: ${STORE_REDIS_PASSWORD:?STORE_REDIS_PASSWORD is required}
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - 128mb
      - --maxmemory-policy
      - noeviction
      - --requirepass
      - ${STORE_REDIS_PASSWORD:?STORE_REDIS_PASSWORD is required}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 15

  app:
    image: beauty-console-app:latest
    restart: unless-stopped
    mem_limit: 768m
    environment:
      TZ: Asia/Shanghai
      JAVA_TOOL_OPTIONS: -Xms128m -Xmx512m -XX:+UseG1GC -XX:MaxMetaspaceSize=192m
      SPRING_PROFILES_ACTIVE: prod
      STORE_PORT: 8080
      STORE_DB_HOST: mysql
      STORE_DB_PORT: 3306
      STORE_DB_DATABASE: ${STORE_DB_DATABASE:-db_platform}
      STORE_DB_USERNAME: ${STORE_DB_USERNAME:-store_app}
      STORE_DB_PASSWORD: ${STORE_DB_PASSWORD:?STORE_DB_PASSWORD is required}
      STORE_REDIS_HOST: redis
      STORE_REDIS_PORT: 6379
      STORE_REDIS_PASSWORD: ${STORE_REDIS_PASSWORD:?STORE_REDIS_PASSWORD is required}
      STORE_REDIS_DATABASE: ${STORE_REDIS_DATABASE:-0}
      STORE_JWT_ADMIN_SECRET_KEY: ${STORE_JWT_ADMIN_SECRET_KEY:?STORE_JWT_ADMIN_SECRET_KEY is required}
      STORE_JWT_ADMIN_TTL: ${STORE_JWT_ADMIN_TTL:-7200000}
      STORE_API_DOCS_ENABLED: ${STORE_API_DOCS_ENABLED:-true}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  web:
    image: beauty-console-web:latest
    restart: unless-stopped
    mem_limit: 128m
    ports:
      - "80:80"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
  redis-data:
